openapi: 3.0.3
info:
  title: panorama-builder API
  description: |
    JSON API for compositing flat photos into a 360° panorama. Stores
    stations (camera setups), photos (with embedded pose), map measurements
    (user-asserted ground truth on the map), image measurements (reticle
    anchors on photos), and control points (cross-station landmarks with
    a latent estimated location).

    Image and map measurements both link directly to a control point;
    the control point is the latent real-world feature both observe.

    All resources use server-assigned 13-character base32 IDs.
    Authentication is out of scope — anyone with the URL has read+write
    access. Field-level validation lives in handler code; this spec
    documents shapes only.
  version: 1.0.0

servers:
  - url: /api

tags:
  - name: meta
  - name: stations
  - name: photos
  - name: map-measurements
  - name: image-measurements
  - name: control-points

paths:
  /healthz:
    get:
      tags: [meta]
      summary: DB-backed liveness check
      operationId: getHealthz
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }
        '503':
          description: DB unreachable
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /stations:
    post:
      tags: [stations]
      summary: Create a station
      operationId: createStation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateStationRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Station' }
        '400': { $ref: '#/components/responses/BadRequest' }
    get:
      tags: [stations]
      summary: List stations, optionally filtered by bbox
      operationId: listStations
      parameters:
        - name: bbox
          in: query
          description: |
            Bounding box as `minLng,minLat,maxLng,maxLat` (four
            comma-separated floats). When omitted, returns up to 1000
            stations ordered by created_at DESC.
          required: false
          schema:
            type: string
            pattern: '^-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?$'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Station' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /stations/{id}:
    parameters:
      - $ref: '#/components/parameters/StationId'
    get:
      tags: [stations]
      summary: Get a station with its photos, measurements, and referenced control points
      operationId: getStation
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HydratedStation' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [stations]
      summary: Update a station's lat/lng/name
      operationId: updateStation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateStationRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Station' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [stations]
      summary: Delete a station and cascade
      description: |
        Cascades to photos and image measurements in the database, and
        removes photo blob files from disk. Control points referenced
        only from the deleted station are NOT cascade-deleted (they
        live cross-station) — they survive without measurements until
        explicitly removed.
      operationId: deleteStation
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /stations/{id}/photos:
    parameters:
      - $ref: '#/components/parameters/StationId'
    post:
      tags: [photos]
      summary: Create a photo on a station (metadata only)
      description: |
        Creates a photo row with an empty blob slot. Upload the image bytes
        via `PUT /photos/{id}/blob` afterwards.
      operationId: createPhoto
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PhotoPosePatch' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Photo' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /photos/{id}:
    parameters:
      - $ref: '#/components/parameters/PhotoId'
    get:
      tags: [photos]
      summary: Get photo metadata
      operationId: getPhoto
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Photo' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [photos]
      summary: Update photo pose / opacity / aspect
      operationId: updatePhoto
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PhotoPosePatch' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Photo' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [photos]
      summary: Delete a photo (and its blob)
      operationId: deletePhoto
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /photos/{id}/blob:
    parameters:
      - $ref: '#/components/parameters/PhotoId'
    put:
      tags: [photos]
      summary: Upload the photo's image blob
      operationId: uploadPhotoBlob
      requestBody:
        required: true
        content:
          'image/*':
            schema:
              type: string
              format: binary
      responses:
        '204': { description: Stored }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '413':
          description: Payload too large (above MAX_BLOB_BYTES)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    get:
      tags: [photos]
      summary: Download the photo's image blob
      operationId: getPhotoBlob
      responses:
        '200':
          description: OK
          content:
            'image/*':
              schema:
                type: string
                format: binary
        '404': { $ref: '#/components/responses/NotFound' }

  /stations/{id}/map-measurements:
    parameters:
      - $ref: '#/components/parameters/StationId'
    post:
      tags: [map-measurements]
      summary: Create a map measurement on a station
      operationId: createMapMeasurement
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MapMeasurementRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MapMeasurement' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /map-measurements/{id}:
    parameters:
      - $ref: '#/components/parameters/MapMeasurementId'
    put:
      tags: [map-measurements]
      summary: Update a map measurement's lat/lng or control point link
      operationId: updateMapMeasurement
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MapMeasurementRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MapMeasurement' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [map-measurements]
      summary: Delete a map measurement
      operationId: deleteMapMeasurement
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /photos/{id}/image-measurements:
    parameters:
      - $ref: '#/components/parameters/PhotoId'
    post:
      tags: [image-measurements]
      summary: Create an image measurement on a photo
      operationId: createImageMeasurement
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ImageMeasurementPatch' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImageMeasurement' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /image-measurements/{id}:
    parameters:
      - $ref: '#/components/parameters/ImageMeasurementId'
    put:
      tags: [image-measurements]
      summary: Update an image measurement's u/v or control point link
      operationId: updateImageMeasurement
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ImageMeasurementPatch' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImageMeasurement' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [image-measurements]
      summary: Delete an image measurement
      operationId: deleteImageMeasurement
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /control-points:
    post:
      tags: [control-points]
      summary: Create a control point
      description: |
        Control points are global (cross-station). Initial est_lat /
        est_lng / est_alt are optional; a CP without estimates is
        a "latent" landmark whose location is unknown until the solver
        triangulates from observations.
      operationId: createControlPoint
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ControlPointPatch' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ControlPoint' }
        '400': { $ref: '#/components/responses/BadRequest' }
    get:
      tags: [control-points]
      summary: List control points, optionally filtered by bbox
      operationId: listControlPoints
      parameters:
        - name: bbox
          in: query
          description: |
            Bounding box as `minLng,minLat,maxLng,maxLat`. Filter is
            applied to the CPs' est_lat/est_lng — CPs with NULL
            estimates are excluded when bbox is set. Returns up to 1000.
          required: false
          schema:
            type: string
            pattern: '^-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?$'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ControlPoint' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /control-points/{id}:
    parameters:
      - $ref: '#/components/parameters/ControlPointId'
    get:
      tags: [control-points]
      summary: Get a control point
      operationId: getControlPoint
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ControlPoint' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [control-points]
      summary: Update a control point's description / estimates
      operationId: updateControlPoint
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ControlPointPatch' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ControlPoint' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [control-points]
      summary: Delete a control point
      description: |
        Cascades `ON DELETE SET NULL` on referencing image and map
        measurements; both survive without their link.
      operationId: deleteControlPoint
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /control-points/{id}/observations:
    parameters:
      - $ref: '#/components/parameters/ControlPointId'
    get:
      tags: [control-points]
      summary: List every observation referencing this control point
      description: |
        Returns image and map measurements across every station that
        link back to the given control point. Each row carries enough
        context (station id + name) for the caller to deep-link.
      operationId: listControlPointObservations
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ControlPointObservations' }
        '404': { $ref: '#/components/responses/NotFound' }

components:
  parameters:
    StationId:
      name: id
      in: path
      required: true
      schema: { $ref: '#/components/schemas/Id' }
    PhotoId:
      name: id
      in: path
      required: true
      schema: { $ref: '#/components/schemas/Id' }
    MapMeasurementId:
      name: id
      in: path
      required: true
      schema: { $ref: '#/components/schemas/Id' }
    ImageMeasurementId:
      name: id
      in: path
      required: true
      schema: { $ref: '#/components/schemas/Id' }
    ControlPointId:
      name: id
      in: path
      required: true
      schema: { $ref: '#/components/schemas/Id' }

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource does not exist
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Id:
      type: string
      description: 13-character base32 server-assigned id
      pattern: '^[A-Z2-7]{13}$'

    Health:
      type: object
      required: [status]
      properties:
        status: { type: string, example: ok }

    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }

    Station:
      type: object
      required: [id, lat, lng, name, created_at, updated_at]
      properties:
        id: { $ref: '#/components/schemas/Id' }
        lat: { type: number, format: double, minimum: -90, maximum: 90 }
        lng: { type: number, format: double, minimum: -180, maximum: 180 }
        name: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Photo:
      type: object
      required:
        - id
        - station_id
        - blob_path
        - mime_type
        - size_bytes
        - aspect
        - photo_az
        - photo_tilt
        - photo_roll
        - size_rad
        - opacity
        - created_at
        - updated_at
      properties:
        id: { $ref: '#/components/schemas/Id' }
        station_id: { $ref: '#/components/schemas/Id' }
        blob_path: { type: string, nullable: true }
        mime_type: { type: string, nullable: true }
        size_bytes: { type: integer, format: int64, nullable: true }
        aspect: { type: number, format: double, description: width / height of the photo in pixels }
        photo_az: { type: number, format: double, description: viewer-azimuth radians (CCW from -Z) }
        photo_tilt: { type: number, format: double, description: viewer-altitude radians (above horizon) }
        photo_roll: { type: number, format: double, description: in-plane roll radians }
        size_rad: { type: number, format: double, description: horizontal angular subtense radians }
        opacity: { type: number, format: double, minimum: 0, maximum: 1 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    MapMeasurement:
      type: object
      description: |
        User-asserted ground-truth observation: the user clicked on the
        map and asserts that some control point is here.
      required: [id, station_id, lat, lng, control_point_id, created_at, updated_at]
      properties:
        id: { $ref: '#/components/schemas/Id' }
        station_id: { $ref: '#/components/schemas/Id' }
        lat: { type: number, format: double, minimum: -90, maximum: 90 }
        lng: { type: number, format: double, minimum: -180, maximum: 180 }
        control_point_id:
          allOf: [{ $ref: '#/components/schemas/Id' }]
          nullable: true
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ImageMeasurement:
      type: object
      description: |
        Reticle anchor on a photo at (u, v): the user identifies that
        some control point is visible at this image-space position.
      required: [id, photo_id, u, v, control_point_id, created_at, updated_at]
      properties:
        id: { $ref: '#/components/schemas/Id' }
        photo_id: { $ref: '#/components/schemas/Id' }
        u: { type: number, format: double, minimum: 0, maximum: 1 }
        v: { type: number, format: double, minimum: 0, maximum: 1 }
        control_point_id:
          allOf: [{ $ref: '#/components/schemas/Id' }]
          nullable: true
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ControlPoint:
      type: object
      description: |
        A real-world landmark with a latent location. May be referenced
        by image measurements (across photos / stations) and map
        measurements. The estimated location (est_lat / est_lng /
        est_alt) is updated by the solver as observations accumulate;
        for v1 the estimate mirrors any linked map measurement.
      required: [id, description, notes, est_lat, est_lng, est_alt, started_at, ended_at, created_at, updated_at]
      properties:
        id: { $ref: '#/components/schemas/Id' }
        description: { type: string }
        notes: { type: string, description: free-form prose describing the control point in detail }
        est_lat: { type: number, format: double, nullable: true, minimum: -90, maximum: 90 }
        est_lng: { type: number, format: double, nullable: true, minimum: -180, maximum: 180 }
        est_alt: { type: number, format: double, nullable: true, description: meters above sea level }
        started_at: { type: string, format: date-time, nullable: true, description: when the landmark began existing }
        ended_at: { type: string, format: date-time, nullable: true, description: when the landmark ceased to exist }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ControlPointImageObservation:
      type: object
      required:
        - id
        - photo_id
        - u
        - v
        - station_id
        - station_name
        - station_lat
        - station_lng
        - photo_az
        - photo_tilt
        - photo_roll
        - size_rad
        - aspect
      properties:
        id: { $ref: '#/components/schemas/Id' }
        photo_id: { $ref: '#/components/schemas/Id' }
        u: { type: number, format: double, minimum: 0, maximum: 1 }
        v: { type: number, format: double, minimum: 0, maximum: 1 }
        station_id: { $ref: '#/components/schemas/Id' }
        station_name: { type: string, nullable: true }
        station_lat: { type: number, format: double, minimum: -90, maximum: 90 }
        station_lng: { type: number, format: double, minimum: -180, maximum: 180 }
        photo_az: { type: number, format: double }
        photo_tilt: { type: number, format: double }
        photo_roll: { type: number, format: double }
        size_rad: { type: number, format: double }
        aspect: { type: number, format: double }

    ControlPointMapObservation:
      type: object
      required: [id, lat, lng, station_id, station_name]
      properties:
        id: { $ref: '#/components/schemas/Id' }
        lat: { type: number, format: double, minimum: -90, maximum: 90 }
        lng: { type: number, format: double, minimum: -180, maximum: 180 }
        station_id: { $ref: '#/components/schemas/Id' }
        station_name: { type: string, nullable: true }

    ControlPointObservations:
      type: object
      required: [image_measurements, map_measurements]
      properties:
        image_measurements:
          type: array
          items: { $ref: '#/components/schemas/ControlPointImageObservation' }
        map_measurements:
          type: array
          items: { $ref: '#/components/schemas/ControlPointMapObservation' }

    HydratedStation:
      type: object
      required: [station, photos, map_measurements, image_measurements, control_points]
      properties:
        station: { $ref: '#/components/schemas/Station' }
        photos:
          type: array
          items: { $ref: '#/components/schemas/Photo' }
        map_measurements:
          type: array
          items: { $ref: '#/components/schemas/MapMeasurement' }
        image_measurements:
          type: array
          items: { $ref: '#/components/schemas/ImageMeasurement' }
        control_points:
          type: array
          description: |
            Control points reachable from this station — i.e., those
            referenced by at least one of this station's measurements.
            Other CPs (in other stations) are not included.
          items: { $ref: '#/components/schemas/ControlPoint' }

    CreateStationRequest:
      type: object
      required: [lat, lng]
      properties:
        lat: { type: number, format: double, minimum: -90, maximum: 90 }
        lng: { type: number, format: double, minimum: -180, maximum: 180 }
        name: { type: string, nullable: true }

    PhotoPosePatch:
      type: object
      required: [aspect, photo_az, photo_tilt, photo_roll, size_rad]
      properties:
        aspect: { type: number, format: double }
        photo_az: { type: number, format: double }
        photo_tilt: { type: number, format: double }
        photo_roll: { type: number, format: double }
        size_rad: { type: number, format: double }
        opacity: { type: number, format: double, minimum: 0, maximum: 1 }

    MapMeasurementRequest:
      type: object
      required: [lat, lng]
      properties:
        lat: { type: number, format: double, minimum: -90, maximum: 90 }
        lng: { type: number, format: double, minimum: -180, maximum: 180 }
        control_point_id:
          allOf: [{ $ref: '#/components/schemas/Id' }]
          nullable: true

    ImageMeasurementPatch:
      type: object
      required: [u, v]
      properties:
        u: { type: number, format: double, minimum: 0, maximum: 1 }
        v: { type: number, format: double, minimum: 0, maximum: 1 }
        control_point_id:
          allOf: [{ $ref: '#/components/schemas/Id' }]
          nullable: true

    ControlPointPatch:
      type: object
      properties:
        description: { type: string }
        notes: { type: string }
        est_lat: { type: number, format: double, nullable: true, minimum: -90, maximum: 90 }
        est_lng: { type: number, format: double, nullable: true, minimum: -180, maximum: 180 }
        est_alt: { type: number, format: double, nullable: true }
        started_at: { type: string, format: date-time, nullable: true }
        ended_at: { type: string, format: date-time, nullable: true }
