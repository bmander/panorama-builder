<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Panorama</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    #view { display: block; cursor: grab; }
    #view:active { cursor: grabbing; }
    #hud { position: fixed; top: 8px; left: 10px; color: #fff;
           font: 12px monospace; text-shadow: 0 0 3px #000; pointer-events: none; }
    #flat-wrap { position: fixed; inset: 0; background: #000; display: none;
                 align-items: center; justify-content: center; }
    #flat-wrap.show { display: flex; }
    #flat { max-width: 100vw; max-height: 100vh; aspect-ratio: 2 / 1; }
    .btn { position: fixed; padding: 6px 10px; background: rgba(0,0,0,0.5);
           color: #fff; border: 1px solid #fff; font: 12px monospace; cursor: pointer; }
    #toggle { top: 8px; right: 8px; }
    #download { top: 8px; right: 105px; }
  </style>
</head>
<body>
  <div id="flat-wrap"><canvas id="flat"></canvas></div>
  <button id="toggle" class="btn">flat view</button>
  <button id="download" class="btn">download PNG</button>
  <div id="hud"></div>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module">
    import * as THREE from 'three';

    /* renderer / camera / scene */
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.domElement.id = 'view';
    document.body.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
    camera.rotation.order = 'YXZ';

    const loader = new THREE.TextureLoader();
    const baseTex = loader.load('panorama.png');
    baseTex.mapping = THREE.EquirectangularReflectionMapping;
    baseTex.colorSpace = THREE.SRGBColorSpace;
    baseTex.anisotropy = renderer.capabilities.getMaxAnisotropy();

    const scene = new THREE.Scene();
    scene.background = baseTex;
    const overlays = new THREE.Group();
    scene.add(overlays);

    /* state */
    let azimuth = 0, altitude = 0;
    const PITCH_LIMIT = Math.PI / 2 - 0.01;
    const FOV_MIN = 15, FOV_MAX = 100;
    const OVERLAY_R = 100;
    const DEFAULT_SIZE_RAD = Math.PI / 6;
    const SIZE_MIN = Math.PI / 180 * 2;     // 2°
    const SIZE_MAX = Math.PI * 0.9;         // 162°

    /* HUD */
    const hud = document.getElementById('hud');
    const deg = r => (r * 180 / Math.PI).toFixed(1);
    function updateHud() {
      let s = `azimuth ${deg(azimuth)}°  altitude ${deg(altitude)}°  fov ${camera.fov.toFixed(1)}°`;
      if (selected) s += `  selected ${deg(selected.userData.sizeRad)}°`;
      hud.textContent = s;
    }

    /* overlay model */
    const widthFromSizeRad = sr => 2 * OVERLAY_R * Math.tan(sr / 2);

    function dirFromAzAlt(az, alt) {
      const v = new THREE.Vector3(0, 0, -1);
      v.applyAxisAngle(new THREE.Vector3(1, 0, 0), alt);
      v.applyAxisAngle(new THREE.Vector3(0, 1, 0), az);
      return v;
    }

    function makeOverlay(tex, aspect) {
      const o = new THREE.Group();
      o.userData.sizeRad = DEFAULT_SIZE_RAD;
      o.userData.aspect = aspect;
      const body = new THREE.Mesh(
        new THREE.PlaneGeometry(1, 1),
        new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide })
      );
      body.userData.role = 'body';
      o.add(body);
      o.userData.body = body;
      applySize(o);
      return o;
    }

    function applySize(o) {
      const w = widthFromSizeRad(o.userData.sizeRad);
      const h = w / o.userData.aspect;
      o.userData.body.scale.set(w, h, 1);
      if (o.userData.outline) o.userData.outline.scale.set(w, h, 1);
      if (o.userData.handles) {
        const corners = [[-0.5, -0.5], [0.5, -0.5], [-0.5, 0.5], [0.5, 0.5]];
        o.userData.handles.forEach((m, i) => {
          m.position.set(corners[i][0] * w, corners[i][1] * h, 0);
        });
      }
    }

    function placeOverlay(o, dir) {
      o.position.copy(dir).normalize().multiplyScalar(OVERLAY_R);
      // For non-Camera Object3D, lookAt already orients the +Z (front) face toward the target.
      o.lookAt(0, 0, 0);
    }

    /* selection visuals */
    function addSelectionVisuals(o) {
      const outline = new THREE.LineSegments(
        new THREE.EdgesGeometry(new THREE.PlaneGeometry(1, 1)),
        new THREE.LineBasicMaterial({ color: 0xffffff, depthTest: false, transparent: true })
      );
      outline.userData.role = 'outline';
      outline.renderOrder = 1;
      outline.raycast = () => {};
      o.add(outline);
      o.userData.outline = outline;

      const handleGeom = new THREE.SphereGeometry(2.5, 12, 8);
      const handleMat = new THREE.MeshBasicMaterial({ color: 0xffffff, depthTest: false });
      o.userData.handles = [];
      [0, 1, 2, 3].forEach(i => {
        const m = new THREE.Mesh(handleGeom, handleMat);
        m.userData.role = 'handle';
        m.userData.cornerIndex = i;
        m.renderOrder = 2;
        o.add(m);
        o.userData.handles.push(m);
      });
      applySize(o);
    }

    function clearSelectionVisuals(o) {
      if (!o) return;
      if (o.userData.outline) {
        o.remove(o.userData.outline);
        o.userData.outline.geometry.dispose();
        o.userData.outline.material.dispose();
        delete o.userData.outline;
      }
      if (o.userData.handles) {
        o.userData.handles.forEach(m => o.remove(m));
        const first = o.userData.handles[0];
        first.geometry.dispose();
        first.material.dispose();
        delete o.userData.handles;
      }
    }

    function setSelectionVisualsVisible(o, visible) {
      if (!o) return;
      if (o.userData.outline) o.userData.outline.visible = visible;
      if (o.userData.handles) o.userData.handles.forEach(m => m.visible = visible);
    }

    let selected = null;
    function select(o) {
      if (selected === o) return;
      clearSelectionVisuals(selected);
      selected = o;
      if (selected) addSelectionVisuals(selected);
      updateHud();
    }

    /* drop-in image loading */
    addEventListener('dragover', e => e.preventDefault());
    addEventListener('drop', e => {
      e.preventDefault();
      for (const file of e.dataTransfer.files) {
        if (!file.type.startsWith('image/')) continue;
        const url = URL.createObjectURL(file);
        loader.load(url, tex => {
          tex.colorSpace = THREE.SRGBColorSpace;
          tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
          const aspect = tex.image.naturalWidth / tex.image.naturalHeight;
          const o = makeOverlay(tex, aspect);
          placeOverlay(o, dirFromAzAlt(azimuth, altitude));
          overlays.add(o);
          select(o);
          URL.revokeObjectURL(url);
        });
      }
    });

    /* pointer interaction */
    const raycaster = new THREE.Raycaster();
    const ndc = new THREE.Vector2();
    const overlaySphere = new THREE.Sphere(new THREE.Vector3(0, 0, 0), OVERLAY_R);
    const tmpVec3 = new THREE.Vector3();

    function ndcFromEvent(e) {
      ndc.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
    }
    function projectToScreen(worldPos) {
      tmpVec3.copy(worldPos).project(camera);
      return { x: (tmpVec3.x + 1) * 0.5 * innerWidth, y: (1 - tmpVec3.y) * 0.5 * innerHeight };
    }

    let mode = null;
    let lastX = 0, lastY = 0;
    let resizeInitial = null;

    renderer.domElement.addEventListener('pointerdown', e => {
      ndcFromEvent(e);
      raycaster.setFromCamera(ndc, camera);
      const hits = raycaster.intersectObjects(overlays.children, true)
        .filter(h => h.object.userData.role === 'body' || h.object.userData.role === 'handle');
      const handleHit = hits.find(h => h.object.userData.role === 'handle');
      const bodyHit = hits.find(h => h.object.userData.role === 'body');

      if (handleHit && handleHit.object.parent === selected) {
        mode = 'resize';
        const center = projectToScreen(selected.position);
        const dx = e.clientX - center.x, dy = e.clientY - center.y;
        resizeInitial = { dist: Math.hypot(dx, dy) || 1, sizeRad: selected.userData.sizeRad };
      } else if (bodyHit) {
        const o = bodyHit.object.parent;
        if (selected !== o) select(o);
        mode = 'move';
      } else {
        select(null);
        mode = 'pan';
      }
      lastX = e.clientX; lastY = e.clientY;
      renderer.domElement.setPointerCapture(e.pointerId);
    });

    const endDrag = () => { mode = null; resizeInitial = null; };
    renderer.domElement.addEventListener('pointerup', endDrag);
    renderer.domElement.addEventListener('pointercancel', endDrag);

    renderer.domElement.addEventListener('pointermove', e => {
      if (!mode) return;
      if (mode === 'pan') {
        const dx = e.clientX - lastX, dy = e.clientY - lastY;
        lastX = e.clientX; lastY = e.clientY;
        // Drag distance scaled so one screen-height ≈ one vertical FOV.
        const radPerPx = (camera.fov * Math.PI / 180) / innerHeight;
        azimuth  += dx * radPerPx;
        altitude = Math.max(-PITCH_LIMIT, Math.min(PITCH_LIMIT, altitude + dy * radPerPx));
        updateHud();
      } else if (mode === 'move' && selected) {
        ndcFromEvent(e);
        raycaster.setFromCamera(ndc, camera);
        const point = new THREE.Vector3();
        if (raycaster.ray.intersectSphere(overlaySphere, point)) {
          selected.position.copy(point);
          selected.lookAt(0, 0, 0);
        }
      } else if (mode === 'resize' && selected && resizeInitial) {
        const center = projectToScreen(selected.position);
        const dx = e.clientX - center.x, dy = e.clientY - center.y;
        const dist = Math.hypot(dx, dy);
        const newSize = resizeInitial.sizeRad * (dist / resizeInitial.dist);
        selected.userData.sizeRad = Math.max(SIZE_MIN, Math.min(SIZE_MAX, newSize));
        applySize(selected);
        updateHud();
      }
    });

    /* wheel zoom */
    renderer.domElement.addEventListener('wheel', e => {
      e.preventDefault();
      // Normalize deltaY to pixels: Firefox mouse wheels report LINE (≈ ±3); Chrome PIXEL (≈ ±100).
      const pxDelta = e.deltaMode === 1 ? e.deltaY * 30 : e.deltaMode === 2 ? e.deltaY * 400 : e.deltaY;
      camera.fov = Math.max(FOV_MIN, Math.min(FOV_MAX, camera.fov * Math.exp(pxDelta * 0.001)));
      camera.updateProjectionMatrix();
      updateHud();
    }, { passive: false });

    /* delete key */
    addEventListener('keydown', e => {
      if ((e.key === 'Backspace' || e.key === 'Delete') && selected) {
        const o = selected;
        select(null);
        overlays.remove(o);
        o.userData.body.geometry.dispose();
        o.userData.body.material.map?.dispose();
        o.userData.body.material.dispose();
      }
    });

    /* equirect bake pipeline */
    const cubeRT = new THREE.WebGLCubeRenderTarget(1024);
    const cubeCam = new THREE.CubeCamera(0.1, 1000, cubeRT);
    cubeCam.position.set(0, 0, 0);

    const equirectScene = new THREE.Scene();
    const equirectCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
    const equirectMat = new THREE.ShaderMaterial({
      uniforms: { cubemap: { value: cubeRT.texture } },
      vertexShader: `
        varying vec2 vUv;
        void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
      `,
      fragmentShader: `
        precision highp float;
        uniform samplerCube cubemap;
        varying vec2 vUv;
        const float PI = 3.14159265359;
        void main() {
          float lon = (vUv.x - 0.5) * 2.0 * PI;
          float lat = (vUv.y - 0.5) * PI;
          float clat = cos(lat);
          // Three.js cube render targets need x-flip on sampling (built-in flipEnvMap convention).
          vec3 dir = vec3(-cos(lon) * clat, sin(lat), sin(lon) * clat);
          vec4 c = textureCube(cubemap, dir);
          // Linear -> approximate sRGB for downstream display/PNG.
          gl_FragColor = vec4(pow(c.rgb, vec3(1.0 / 2.2)), c.a);
        }
      `,
    });
    equirectScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), equirectMat));
    const equirectRT = new THREE.WebGLRenderTarget(2048, 1024);

    function bakeComposite(width = 2048) {
      const height = width / 2;
      setSelectionVisualsVisible(selected, false);
      cubeCam.update(renderer, scene);
      if (equirectRT.width !== width) equirectRT.setSize(width, height);
      const prev = renderer.getRenderTarget();
      renderer.setRenderTarget(equirectRT);
      renderer.render(equirectScene, equirectCam);
      renderer.setRenderTarget(prev);
      const pixels = new Uint8Array(width * height * 4);
      renderer.readRenderTargetPixels(equirectRT, 0, 0, width, height, pixels);
      setSelectionVisualsVisible(selected, true);
      return { pixels, width, height };
    }

    function paintBakeToCanvas(canvas, bake) {
      canvas.width = bake.width;
      canvas.height = bake.height;
      const ctx = canvas.getContext('2d');
      const img = ctx.createImageData(bake.width, bake.height);
      const stride = bake.width * 4;
      // WebGL pixel buffer is bottom-up; flip Y when copying into ImageData.
      for (let y = 0; y < bake.height; y++) {
        const src = (bake.height - 1 - y) * stride;
        img.data.set(bake.pixels.subarray(src, src + stride), y * stride);
      }
      ctx.putImageData(img, 0, 0);
    }

    /* flat-view toggle */
    const flatCanvas = document.getElementById('flat');
    const flatWrap = document.getElementById('flat-wrap');
    const toggleBtn = document.getElementById('toggle');
    let showingFlat = false;
    toggleBtn.addEventListener('click', () => {
      showingFlat = !showingFlat;
      if (showingFlat) paintBakeToCanvas(flatCanvas, bakeComposite(2048));
      flatWrap.classList.toggle('show', showingFlat);
      renderer.domElement.style.display = showingFlat ? 'none' : 'block';
      hud.style.display = showingFlat ? 'none' : 'block';
      toggleBtn.textContent = showingFlat ? '360° view' : 'flat view';
    });

    /* download PNG */
    document.getElementById('download').addEventListener('click', () => {
      const bake = bakeComposite(4096);
      const c = document.createElement('canvas');
      paintBakeToCanvas(c, bake);
      c.toBlob(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'panorama-composite.png';
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 1000);
      });
    });

    /* resize */
    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight);
    });

    /* main loop */
    updateHud();
    function frame() {
      camera.rotation.y = azimuth;
      camera.rotation.x = altitude;
      renderer.render(scene, camera);
      requestAnimationFrame(frame);
    }
    frame();
  </script>
</body>
</html>
