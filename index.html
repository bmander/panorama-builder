<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Panorama</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="flat-wrap"><canvas id="flat"></canvas></div>
  <div id="map-wrap">
    <div id="map"></div>
    <button id="set-location" class="btn">Set location</button>
    <div id="map-coords"></div>
  </div>
  <div id="tabs">
    <button id="tab-360" class="btn tab">360°</button>
    <button id="tab-flat" class="btn tab">Flat</button>
    <button id="tab-map" class="btn tab">Map</button>
  </div>
  <button id="download" class="btn">download PNG</button>
  <div id="hud"></div>
  <div id="tools">
    <button id="tool-move" class="btn tool">Move</button>
    <button id="tool-poi" class="btn tool">POI</button>
  </div>
  <div id="locks">
    <label class="lock"><input type="checkbox" id="lock-camera"> Lock camera position</label>
    <label class="lock">Terrain
      <select id="terrain-mode">
        <option value="off">off</option>
        <option value="wireframe">wireframe</option>
        <option value="shaded">shaded</option>
      </select>
    </label>
    <label class="lock">Sun <input type="datetime-local" id="sun-datetime" step="60"></label>
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "leaflet": "https://unpkg.com/leaflet@1.9.4/dist/leaflet-src.esm.js"
      }
    }
  </script>
  <script type="module" src="build/main.js"></script>
</body>
</html>
