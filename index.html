<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Panorama</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    canvas { display: block; cursor: grab; }
    canvas:active { cursor: grabbing; }
    #hud { position: fixed; top: 8px; left: 10px; color: #fff;
           font: 12px monospace; text-shadow: 0 0 3px #000; }
  </style>
</head>
<body>
  <div id="hud"></div>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
    camera.rotation.order = 'YXZ';

    const tex = new THREE.TextureLoader().load('panorama.png');
    tex.mapping = THREE.EquirectangularReflectionMapping;
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.anisotropy = renderer.capabilities.getMaxAnisotropy();

    const scene = new THREE.Scene();
    scene.background = tex;

    let azimuth = 0;
    let altitude = 0;
    const PITCH_LIMIT = Math.PI / 2 - 0.01;
    const FOV_MIN = 15, FOV_MAX = 100;

    const hud = document.getElementById('hud');
    const deg = r => (r * 180 / Math.PI).toFixed(1);
    const updateHud = () => {
      hud.textContent = `azimuth ${deg(azimuth)}°  altitude ${deg(altitude)}°  fov ${camera.fov.toFixed(1)}°`;
    };
    updateHud();

    let dragging = false, lastX = 0, lastY = 0;
    const endDrag = () => dragging = false;
    renderer.domElement.addEventListener('pointerdown', e => {
      dragging = true; lastX = e.clientX; lastY = e.clientY;
      renderer.domElement.setPointerCapture(e.pointerId);
    });
    renderer.domElement.addEventListener('pointerup', endDrag);
    renderer.domElement.addEventListener('pointercancel', endDrag);
    renderer.domElement.addEventListener('pointermove', e => {
      if (!dragging) return;
      const dx = e.clientX - lastX, dy = e.clientY - lastY;
      lastX = e.clientX; lastY = e.clientY;
      // Drag distance scaled so one screen-height ≈ one vertical FOV.
      const radPerPx = (camera.fov * Math.PI / 180) / innerHeight;
      azimuth  += dx * radPerPx;
      altitude += dy * radPerPx;
      altitude = Math.max(-PITCH_LIMIT, Math.min(PITCH_LIMIT, altitude));
      updateHud();
    });

    renderer.domElement.addEventListener('wheel', e => {
      e.preventDefault();
      // Normalize deltaY to pixels: Firefox mouse wheels report LINE (≈ ±3); Chrome PIXEL (≈ ±100).
      const pxDelta = e.deltaMode === 1 ? e.deltaY * 30 : e.deltaMode === 2 ? e.deltaY * 400 : e.deltaY;
      camera.fov = Math.max(FOV_MIN, Math.min(FOV_MAX, camera.fov * Math.exp(pxDelta * 0.001)));
      camera.updateProjectionMatrix();
      updateHud();
    }, { passive: false });

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight);
    });

    function frame() {
      camera.rotation.y = azimuth;
      camera.rotation.x = altitude;
      renderer.render(scene, camera);
      requestAnimationFrame(frame);
    }
    frame();
  </script>
</body>
</html>
