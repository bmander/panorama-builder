<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Control point</title>
  <link rel="stylesheet" href="/cp.css">
</head>
<body>
  <main>
    <a class="back" href="/">← back to map</a>
    <h1 id="name"></h1>
    <dl>
      <dt>id</dt><dd id="id"></dd>
      <dt>location</dt><dd id="loc"></dd>
      <dt>elevation</dt><dd id="alt"></dd>
      <dt>started</dt><dd id="started_at" class="empty"></dd>
      <dt>ended</dt><dd id="ended_at" class="empty"></dd>
    </dl>
    <h2>Notes</h2>
    <div id="notes" class="notes empty"></div>
    <h2>Observations</h2>
    <ul id="observations" class="observations"></ul>
    <div class="actions">
      <button id="delete" class="danger" type="button" disabled>Delete control point</button>
    </div>
  </main>
  <script type="module" src="/build/cp-page.js"></script>
</body>
</html>
