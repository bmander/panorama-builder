<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Panorama</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="map-wrap">
    <div id="map"></div>
    <div id="map-coords"></div>
  </div>
  <div id="top-right">
    <button id="admin-btn" class="btn" hidden>Admin</button>
    <button id="settings-btn" class="btn" aria-expanded="false">⚙ Settings</button>
    <button id="add-poi" class="btn">+ POI</button>
    <button id="download" class="btn">download PNG</button>
    <div id="tabs">
      <button id="tab-360" class="btn tab">360°</button>
      <button id="tab-map" class="btn tab">Map</button>
    </div>
  </div>
  <div id="admin-modal" class="modal" hidden>
    <div class="modal-panel">
      <div class="modal-header">
        <span>Project admin</span>
        <button type="button" id="admin-close" class="btn">✕</button>
      </div>
      <button type="button" id="admin-delete" class="btn danger">Delete project</button>
    </div>
  </div>
  <div id="start-project-modal" class="modal" hidden>
    <div class="modal-panel">
      <div class="modal-header">
        <span>New project</span>
        <button type="button" id="start-project-close" class="btn">✕</button>
      </div>
      <label class="modal-field">Title
        <input type="text" id="start-project-title" required maxlength="120">
      </label>
      <label class="modal-field">Date estimate
        <input type="datetime-local" id="start-project-date" step="60">
      </label>
      <div class="modal-field">
        <span>Photos</span>
        <div id="start-project-drop" class="drop-zone">
          <span>Drop images here, or click to choose</span>
          <input type="file" id="start-project-files" accept="image/*" multiple hidden>
        </div>
        <div id="start-project-photos-preview"></div>
      </div>
      <div class="modal-actions">
        <button type="button" id="start-project-cancel" class="btn">Cancel</button>
        <button type="button" id="start-project-submit" class="btn">Create</button>
      </div>
    </div>
  </div>
  <div id="settings-panel" hidden>
    <label class="settings-check"><input type="checkbox" id="lock-camera"> Lock camera position</label>
    <label class="settings-check"><input type="checkbox" id="solve-roll-toggle"> Auto-solve photo rotation</label>
    <label class="settings-inline">Terrain
      <select id="terrain-mode">
        <option value="off">off</option>
        <option value="wireframe">wireframe</option>
        <option value="shaded">shaded</option>
      </select>
    </label>
    <label class="settings-inline">Sun <input type="datetime-local" id="sun-datetime" step="60"></label>
    <label class="settings-inline" id="overlay-opacity-row">Photo opacity
      <input type="range" id="overlay-opacity" min="0" max="100" value="100" step="1">
    </label>
    <div class="settings-row">
      <label for="haze-slider">Atmospheric haze</label>
      <input type="range" id="haze-slider" min="0" max="100" value="17" step="1">
    </div>
    <label class="settings-check"><input type="checkbox" id="curvature-toggle" checked> Earth curvature</label>
    <label class="settings-check"><input type="checkbox" id="refraction-toggle" checked> Atmospheric refraction</label>
  </div>
  <div id="hud"></div>
  <div id="save-error" hidden>
    <span id="save-error-msg"></span>
    <button type="button" id="save-error-retry" class="btn">Retry</button>
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "leaflet": "https://unpkg.com/leaflet@1.9.4/dist/leaflet-src.esm.js"
      }
    }
  </script>
  <script type="module" src="build/main.js"></script>
</body>
</html>
